<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicolaus Cusanus Gymnasium Bergisch Gladbach</title>
    <link rel="stylesheet" href="css/mainStyle.css">
    <link rel="stylesheet" href="css/style-landingPage.css">
</head>

<body>
    <header>
        <img class="NCGLogo" src="assets/NCG_Logo.webp">

        <button class="MenuButton" id="MenuButton">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
    </header>

    <div class="overlay" id="overlay"></div>

    <nav class="sideMenu" id="sideMenu">
        <div class="menuItem">
            <button class="menuCategory">Über uns</button>
            <div class="submenu">
                <a href="#">Schulleitung</a>
                <a href="#">Geschichte</a>
            </div>
        </div>

        <div class="menuItem">
            <button class="menuCategory">Unsere Ideen</button>
            <div class="submenu">
                <a href="#">Leitbild</a>
                <a href="#">Projekte</a>
            </div>
        </div>

        <div class="menuItem">
            <button class="menuCategory">Unterricht</button>
            <div class="submenu">
                <a href="#">Fächer</a>
            </div>
        </div>

        <div class="menuItem">
            <button class="menuCategory">Angebote</button>
            <div class="submenu">
                <a href="#">AGs</a>
            </div>
        </div>

        <div class="menuItem">
            <button class="menuCategory">Service</button>
            <div class="submenu">
                <a href="#">Kontakt</a>
            </div>
        </div>
    </nav>


    <div class="slideshow">
        <div class="slide active">
            <img src="assets/slide1.jpg" alt="Slide 1">
            
        <div class="slide">
            <img src="assets/slide2.jpg" alt="Slide 2">
            
        </div>
        <div class="slide">
            <img src="assets/slide3.jpg" alt="Slide 3">
            
        </div>
    </div>

</body>
<script>
const menuButton = document.getElementById("MenuButton");
const sideMenu = document.getElementById("sideMenu");
const overlay = document.getElementById("overlay");

function toggleMenu() {
    menuButton.classList.toggle("active");
    sideMenu.classList.toggle("active");
    overlay.classList.toggle("active");
}

menuButton.addEventListener("click", toggleMenu);
overlay.addEventListener("click", toggleMenu);

document.querySelectorAll(".menuCategory").forEach(btn => {
    btn.addEventListener("click", () => {
        btn.parentElement.classList.toggle("open");
    });
});
</script>

</html>
