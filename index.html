<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nicolaus Cusanus Gymnasium Bergisch Gladbach</title>
    <link rel="stylesheet" href="css/mainStyle.css">
    <link rel="stylesheet" href="css/style-landingPage.css">
    <link rel="stylesheet" href="css/ArticleStyleSheetSection.css">
    <script src="ts/mainScriptLandingPage.js" defer></script>
    <script src="ts/Articles.js" defer></script>
    <script src="ts/menu.js" defer></script>
    <script src="ts/clickNCGLOGO.js" defer></script>
</head>

<body>
    <header>
        <img class="NCGLogo" id="NCGLogo" src="assets/NCG_Logo.webp">

        <button class="MenuButton" id="MenuButton">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </button>
    </header>

    <div class="overlay" id="overlay"></div>

    <nav class="sideMenu" id="sideMenu">
        <div class="menuItem">
            <button class="menuCategory">Über uns</button>
            <div class="submenu">
                <a href="#">Schulleitung</a>
                <a href="#">Geschichte</a>
                <a href="#">Kollegium</a>
                <a href="#">Alle Artikel</a>
            </div>
        </div>

        <div class="menuItem">
            <button class="menuCategory">Unsere Ideen</button>
            <div class="submenu">
                <a href="#">Leitbild</a>
                <a href="#">Projekte</a>
            </div>
        </div>

        <div class="menuItem">
            <button class="menuCategory">Unterricht</button>
            <div class="submenu">
                <a href="#">Fächer</a>
            </div>
        </div>

        <div class="menuItem">
            <button class="menuCategory">Angebote</button>
            <div class="submenu">
                <a href="#">AGs</a>
            </div>
        </div>

        <div class="menuItem">
            <button class="menuCategory">Service</button>
            <div class="submenu">
                <a href="#">Kontakt</a>
            </div>
        </div>
    </nav>


    <div class="slideshow">
        <div class="slide active">
            <img src="assets/Slide1.jpg" alt="Slide 1">
        </div>
        <div class="slide">
            <img src="assets/Slide2.jpg" alt="Slide 2">

        </div>
        <button class="arrow prev" id="prevBtn">❮</button>
        <button class="arrow next" id="nextBtn">❯</button>
        <div class="dots" id="dots"></div>

    </div>
    <h1 class="SectionHeaderArticles">Neueste Artikel</h1>
    <section class="articles" id="articlesContainer"></section>

</body>

</html>
