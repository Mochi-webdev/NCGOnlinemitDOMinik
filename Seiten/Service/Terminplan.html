            <span class="bar"></span>
        </button>
    </header>

    <div class="overlay" id="overlay"></div>

    <nav class="sideMenu" id="sideMenu">
        <div class="menuItem">
            <button class="menuCategory">Über uns</button>
            <div class="submenu">
                <a href="#">Schulleitung</a>
                <a href="#">Geschichte</a>
                <a href="#">Kollegium</a>

        <div class="detail-content" role="dialog" aria-modal="true" aria-labelledby="detail-title">
            <button id="detail-close" class="detail-close" aria-label="Details schließen">×</button>
            <h3 id="detail-title">Termin-Details</h3>
            <div class="detail-field">
                <strong>Datum</strong>

            </div>
            <div class="detail-field">

            </div>
